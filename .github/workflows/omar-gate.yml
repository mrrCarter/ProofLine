name: Omar Gate
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - baseline
          - deep
          - audit
          - full-depth
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P2
        type: choice
        options:
          - P0
          - P1
          - P2
          - none
      p2_max_allowed:
        description: Maximum allowed P2 findings
        required: false
        default: "5"
        type: string
permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  omar_gate:
    name: Omar Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate Sentinelayer token
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |-
          set -euo pipefail
          # Fail CLOSED: a merge gate that passes when it cannot run is fail-open.
          # The secret is configured for this repo, so a missing token means
          # misconfiguration (or an untrusted fork that cannot access secrets) and
          # must BLOCK the merge rather than pass vacuously. A maintainer re-runs
          # from a trusted branch after fixing the secret.
          if [ -z "${SENTINELAYER_TOKEN}" ]; then
            echo "::error::SENTINELAYER_TOKEN is not available — Omar Gate cannot run, failing closed."
            echo "Set it with: gh secret set SENTINELAYER_TOKEN --repo <owner>/<repo>"
            echo "Local equivalent: npx sentinelayer-cli@latest /omargate deep --path ."
            exit 1
          fi
      - name: Run Omar Gate
        id: omar
        uses: mrrCarter/sentinelayer-v1-action@03d7369cba7de2e9f15b959275c982111f0ee493
        with:
          github_token: ${{ github.token }}
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          # Managed LLM via the single purpose-scoped SENTINELAYER_TOKEN.
          # The OPENAI_API_KEY / GOOGLE_API_KEY passthrough was removed: those
          # secrets are not configured for this repo (they expanded to empty),
          # the gate already ran through the token-managed path, and forwarding
          # provider keys to a third-party action widened the blast radius for
          # no benefit (Omar P2, omar-gate.yml secrets finding).
          sentinelayer_managed_llm: "true"
          scan_mode: deep
          severity_gate: P2
          model: gpt-5.3-codex
          codex_model: gpt-5.3-codex
          model_fallback: gemini-2.5-flash
          llm_failure_policy: block
          playwright_mode: audit
          sbom_mode: off
          wait_for_completion: "true"
      - name: Enforce merge thresholds
        shell: bash
        env:
          P0_COUNT: ${{ steps.omar.outputs.p0_count || '0' }}
          P1_COUNT: ${{ steps.omar.outputs.p1_count || '0' }}
          P2_COUNT: ${{ steps.omar.outputs.p2_count || '0' }}
          P2_MAX: ${{ github.event_name == 'workflow_dispatch' && inputs.p2_max_allowed || '5' }}
        run: |-
          set -euo pipefail
          p0="$(echo "${P0_COUNT}" | tr -d '\r' | xargs)"
          p1="$(echo "${P1_COUNT}" | tr -d '\r' | xargs)"
          p2="$(echo "${P2_COUNT}" | tr -d '\r' | xargs)"
          p2_max="$(echo "${P2_MAX}" | tr -d '\r' | xargs)"
          if [ "${p0:-0}" -gt 0 ] || [ "${p1:-0}" -gt 0 ]; then
            echo "::error::Omar Gate blocked: P0=${p0}, P1=${p1}"
            exit 1
          fi
          if [ "${p2:-0}" -gt "${p2_max:-5}" ]; then
            echo "::error::Omar Gate blocked: P2=${p2} exceeds max ${p2_max}"
            exit 1
          fi
      - name: Omar summary
        shell: bash
        run: |-
          echo "## Omar Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- gate: \`${{ steps.omar.outputs.gate_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- findings: P0=${{ steps.omar.outputs.p0_count }} P1=${{ steps.omar.outputs.p1_count }} P2=${{ steps.omar.outputs.p2_count }} P3=${{ steps.omar.outputs.p3_count }}" >> "$GITHUB_STEP_SUMMARY"
