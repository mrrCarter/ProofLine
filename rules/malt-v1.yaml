id: malt-v1
name: Malt Beverage Rule Pack
version: "1.0.0"
commodity: malt
rules:
  - id: BRAND_NAME_MATCH
    name: Brand Name Match
    severity: HIGH
    threshold: 0.93
    description: Verifies that the brand name on the label matches the expected brand name.
  - id: NET_CONTENTS_MATCH
    name: Net Contents Match
    severity: HIGH
    toleranceMl: 1.0
    description: Normalizes mL, cL, and L before comparison.
  - id: GOVERNMENT_WARNING_PRESENT
    name: Government Warning Present
    severity: HIGH
    description: Detects the required government warning anchor on the label.
  - id: GOVERNMENT_WARNING_EXACT_TEXT
    name: Government Warning Exact Text
    severity: HIGH
    source: https://www.ecfr.gov/current/title-27/chapter-I/subchapter-A/part-16/subpart-C/section-16.21
    description: Compares the warning statement to the pinned 27 CFR 16.21 text with whitespace-collapse-only normalization.
