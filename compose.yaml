services:
  proofline:
    build: .
    ports:
      - "8000:8000"
    environment:
      - VISION_PROVIDER=local
      - PROOFLINE_ENV=development
      - PROOFLINE_ALLOW_EPHEMERAL_RECEIPTS=true
      - PROOFLINE_PUBLIC_KEY_ID=proofline-dev-ephemeral
      - UI_STATIC_DIR=/app/static
    volumes:
      - ./artifacts:/app/artifacts
